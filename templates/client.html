<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CloudForensics — Client Interface</title>

  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #050a0e;
      --panel: #0a1520;
      --border: #1a3040;
      --accent: #00d4ff;
      --accent2: #00ff88;
      --warn: #ffb020;
      --text: #c8dce8;
      --text-dim: #607080;
      --glow: 0 0 20px rgba(0,212,255,0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      background: rgba(5,10,14,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 60px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Share Tech Mono', monospace;
      color: var(--accent);
      font-size: 18px;
      letter-spacing: 2px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border: 2px solid var(--accent);
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 6px;
    }

    .btn {
      padding: 7px 18px;
      border-radius: 5px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    .btn-admin {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    main {
      max-width: 1200px;
      margin: auto;
      padding: 28px;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .section-header {
      font-family: 'Share Tech Mono';
      color: var(--text-dim);
      font-size: 12px;
      margin-bottom: 15px;
      letter-spacing: 2px;
    }

    .upload-form {
      display: flex;
      gap: 10px;
    }

    .file-input {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--border);
      background: rgba(0,212,255,0.05);
      color: var(--text);
    }

    .btn-upload {
      background: rgba(0,212,255,0.12);
      border: 1px solid var(--accent);
      color: var(--accent);
    }

    .file-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid rgba(26,48,64,0.5);
    }

    .file-name {
      font-family: 'Share Tech Mono';
      color: var(--text);
    }

    .file-actions {
      display: flex;
      gap: 8px;
    }

    .btn-small {
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text-dim);
    }

    .btn-view {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .btn-edit {
      border-color: var(--warn);
      color: var(--warn);
    }

    .btn-download {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-small:hover {
      opacity: 0.8;
    }

    .empty {
      text-align: center;
      color: var(--text-dim);
      padding: 40px;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">
    <div class="logo-icon">⬡</div>
    CLOUDFORENSICS
  </div>
  <a href="/admin" class="btn btn-admin">⚙ ADMIN</a>
</header>

<main>

  <!-- UPLOAD -->
  <div class="section">
    <div class="section-header">UPLOAD FILE</div>
    <form class="upload-form" action="/upload" method="post" enctype="multipart/form-data">
      <input class="file-input" type="file" name="file" required>
      <button class="btn btn-upload" type="submit">UPLOAD</button>
    </form>
  </div>

  <!-- FILE LIST -->
  <div class="section">
    <div class="section-header">FILES</div>

    {% if files %}
      {% for file in files %}
      <div class="file-item">
        <div class="file-name">{{ file.name }}</div>

        <div class="file-actions">

          <!-- VIEW -->
          <a class="btn-small btn-view" href="/view/{{ file.path }}">
            VIEW
          </a>

          <!-- EDIT -->
          <a class="btn-small btn-edit" href="/edit/{{ file.path }}">
            EDIT
          </a>

          <!-- DOWNLOAD / OPEN -->
          <a class="btn-small btn-download" href="/download/{{ file.path }}" target="_blank">
            OPEN/DOWNLOAD
          </a>

        </div>
      </div>
      {% endfor %}
    {% else %}
      <div class="empty">
        📁 No files uploaded yet
      </div>
    {% endif %}

  </div>

</main>

</body>
</html>
