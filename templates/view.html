<!DOCTYPE html>
<html>
<head>
  <title>View File</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #0b1220, #05070c);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    h2 {
      color: #00ffcc;
      margin: 10px 0 15px;
      font-size: 20px;
      text-align: center;
    }

    .tag {
      font-size: 12px;
      color: #888;
      margin-bottom: 10px;
      text-align: center;
    }

    .box {
      width: 100%;
      max-width: 1000px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 14px;
      padding: 15px;
      box-shadow: 0 0 25px rgba(0,255,200,0.05);
    }

    /* IMPORTANT FIX FOR SPACE */
    pre {
      margin: 0;
      background: #0a0f18;
      border: 1px solid #222;
      padding: 12px;
      border-radius: 10px;
      color: #00ffcc;
      font-size: 13px;
      line-height: 1.5;

      /* FIX EXTRA SPACE ISSUE */
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: break-word;
      max-height: 60vh;   /* prevents huge page */
      overflow-y: auto;   /* scroll instead of stretching */
    }

    .actions {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    a {
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      transition: 0.3s;
    }

    .edit {
      background: linear-gradient(90deg, #00ffcc, #00b8ff);
      color: #000;
    }

    .edit:hover {
      transform: scale(1.05);
    }

    .back {
      background: rgba(255,255,255,0.08);
      color: #00d4ff;
      border: 1px solid #00d4ff;
    }

    .back:hover {
      background: rgba(0,212,255,0.1);
    }
  </style>
</head>

<body>

  <div class="tag">🔐 Secure Forensic File Viewer</div>

  <h2>📄 {{ filename }}</h2>

  <div class="box">
    <pre>{{ content }}</pre>

    <div class="actions">
      <a class="edit" href="/edit/{{ filename }}">✏ Edit File</a>
      <a class="back" href="/">⬅ Back</a>
    </div>
  </div>

</body>
</html>
